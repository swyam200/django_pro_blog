{% extends 'blog/base.html' %}
{% block content %}
<div class="alert alert-info">
    <nav>
        {% if user.is_authenticated %}
        <form action="{% url 'logout' %}" method="post">{% csrf_token %}
            <button type="submit">Logout</button>
        </form>
        {% else %}
        <a href="{% url 'login' %}">Login</a>
        {% endif %}
    </nav>
</div>
{%endblock content %}
